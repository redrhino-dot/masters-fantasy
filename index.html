<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters 2026 — Fantasy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green-deep:#002a18;--green:#006747;--green-light:#0d7d55;--gold:#c9a84c;--gold-light:#e0c06e;--bg:#0f110e;--surface:#181a16;--surface-2:#20231e;--surface-3:#282b25;--border:rgba(255,255,255,.07);--border-gold:rgba(201,168,76,.25);--text:#edeae2;--text-muted:#888878;--text-faint:#484840;--red:#c0392b;--score-green:#27ae60;--r-sm:6px;--r-md:10px;--r-lg:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100dvh}
.hdr{background:var(--green-deep);border-bottom:1px solid var(--border-gold);padding:13px 20px 11px;text-align:center;position:sticky;top:0;z-index:100;position:relative}
.hdr-inner{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px}
.hdr h1{font-family:'Libre Baskerville',Georgia,serif;font-size:1.2rem;font-weight:400;color:var(--gold);letter-spacing:.03em}
.hdr-meta{display:flex;align-items:center;justify-content:center;gap:10px}
.hdr-sub{font-size:.68rem;color:rgba(255,255,255,.4);letter-spacing:.07em;text-transform:uppercase}
.live-dot{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.live-dot.live{color:#5ab87a}.live-dot.live::before{content:'';width:6px;height:6px;border-radius:50%;background:#27ae60;animation:pulse 1.5s ease-in-out infinite}
.live-dot.stale{color:var(--text-faint)}.live-dot.stale::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text-faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:11px 10px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:inherit;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}.tab:hover:not(.on){color:var(--text);background:rgba(255,255,255,.03)}
.main{max-width:660px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}
.info-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:9px 15px;margin-bottom:14px}
.info-bar span{font-size:.77rem;color:var(--text-muted)}.info-bar strong{color:var(--text)}
.stitle{font-size:.67rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin:16px 0 8px}
.ltable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px}
.lrow{display:grid;grid-template-columns:44px 1fr auto auto;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border);gap:10px}
.lrow:last-child{border-bottom:none}.lrow.winner{background:linear-gradient(90deg,rgba(201,168,76,.07) 0%,transparent 60%)}
.rank{text-align:center;font-size:1.05rem;line-height:1}
.tname{font-weight:600;font-size:.92rem}
.ltopar{font-size:.88rem;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;color:var(--text-muted)}
.tscore{font-size:1.2rem;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:9px;overflow:hidden}
.tcard-hdr{background:var(--surface-2);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tcard-name{font-weight:600;font-size:.92rem}
.tcard-right{display:flex;align-items:center;gap:12px}
.tcard-topar{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.tcard-total{font-size:.78rem;color:var(--text-faint);font-variant-numeric:tabular-nums}
.prow{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:9px 15px;gap:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.prow:last-child{border-bottom:none}
.pinfo{min-width:0}
.pname{font-size:.86rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.prounds{font-size:.68rem;color:var(--text-faint);margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.prounds span.scored{color:var(--text-muted)}
.ptopar{font-size:.95rem;font-weight:700;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
.ptopar.under{color:var(--score-green)}.ptopar.over{color:#e07060}.ptopar.even{color:var(--text)}.ptopar.na{color:var(--text-faint)}
.ppos{font-size:.82rem;font-weight:600;min-width:32px;text-align:right;color:var(--text-muted);font-variant-numeric:tabular-nums}
.ppos.top{color:var(--score-green)}.ppos.mid{color:var(--text)}.ppos.bot{color:#e07060}.ppos.cut{color:#e07060;font-size:.72rem}
.badge{border-radius:100px;font-size:.58rem;padding:2px 7px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;line-height:1.5}
.bl{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.bc{background:rgba(192,57,43,.1);color:#e07060;border:1px solid rgba(192,57,43,.3)}
.bf{background:rgba(39,174,96,.08);color:#5ab87a;border:1px solid rgba(39,174,96,.22)}
.rnd-hdr{display:grid;grid-template-columns:1fr auto auto;padding:5px 15px 4px;border-bottom:1px solid var(--border);background:var(--surface-3)}
.rnd-hdr span{font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint)}
.rnd-hdr .rh-right{display:flex;gap:40px}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
      <ellipse cx="16" cy="16" rx="13" ry="13" fill="#004d33"/>
      <path d="M16 5C16 5 9 12 9 20c0 5.5 3 8 7 8s7-2.5 7-8c0-8-7-15-7-15z" fill="#006747" stroke="rgba(201,168,76,.5)" stroke-width=".8"/>
      <line x1="16" y1="5" x2="16" y2="28" stroke="rgba(201,168,76,.3)" stroke-width=".6"/>
    </svg>
    <h1>Masters 2026 Fantasy</h1>
  </div>
  <div class="hdr-meta">
    <span class="hdr-sub" id="hdrRound">Round 1</span>
    <span class="live-dot stale" id="liveDot">Loading…</span>
  </div>
  <button id="refreshBtn" onclick="manualRefresh()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:1px solid rgba(201,168,76,.3);border-radius:50%;width:34px;height:34px;cursor:pointer;color:var(--gold);font-size:1.1rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:opacity .2s">↻</button>
</header>

<nav class="tabs" id="tabBar">
  <button class="tab on" data-panel="overall">Overall</button>
  <button class="tab" data-panel="league1">League 1</button>
  <button class="tab" data-panel="league2">League 2</button>
  <button class="tab" data-panel="teams">All Teams</button>
</nav>

<main class="main">
  <div id="panel-overall" class="panel on">
    <div class="info-bar">
      <span>🏆 <strong id="infoRound">Round 1</strong> Standings</span>
      <span id="infoUpdated">—</span>
    </div>
    <p class="stitle">League Table</p>
    <div class="ltable" id="tbl-overall"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-overall"></div>
  </div>

  <div id="panel-league1" class="panel">
    <div class="ltable" style="margin-bottom:14px">
      <div style="font-size:.73rem;color:var(--text-faint);padding:8px 15px 9px">League 1 · Kris · Graham · Carey</div>
    </div>
    <p class="stitle">League 1 Table</p>
    <div class="ltable" id="tbl-league1"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-league1"></div>
  </div>

  <div id="panel-league2" class="panel">
    <div class="ltable" style="margin-bottom:14px">
      <div style="font-size:.73rem;color:var(--text-faint);padding:8px 15px 9px">League 2 · Kris · Matt · Patrick</div>
    </div>
    <p class="stitle">League 2 Table</p>
    <div class="ltable" id="tbl-league2"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-league2"></div>
  </div>

  <div id="panel-teams" class="panel">
    <div class="info-bar">
      <span>All 5 teams</span>
      <span id="infoUpdated3">—</span>
    </div>
    <div id="cards-teams"></div>
  </div>
</main>

<script>
const TEAMS={Kris:['Xander Schauffele','Tommy Fleetwood','Harris English','Charl Schwartzel'],Graham:['Jon Rahm','Tyrrell Hatton','Cameron Smith','Dustin Johnson'],Carey:['Jon Rahm','Matt Fitzpatrick','JJ Spaun','Aaron Rai'],Matt:['Xander Schauffele','Cameron Young','Marco Penge','Samuel Stevens'],Patrick:['Bryson DeChambeau','Tommy Fleetwood','Chris Gotterup','Sergio Garcia']};
const LEAGUES={overall:['Kris','Graham','Carey','Matt','Patrick'],league1:['Kris','Graham','Carey'],league2:['Kris','Matt','Patrick']};
const MEDALS=['🥇','🥈','🥉'];
const ROUND_LABELS={R1:'Round 1',R2:'Round 2',R3:'Round 3',R4:'Round 4'};

const state={
  currentRound:'R1',lastUpdated:'—',cutLine:null,
  players:{
    'Xander Schauffele':{position:6, toPar:'-2',r1:'70',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Tommy Fleetwood':  {position:10,toPar:'-1',r1:'71',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Harris English':   {position:33,toPar:'+1',r1:'73',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Charl Schwartzel': {position:48,toPar:'+3',r1:'75',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Jon Rahm':         {position:73,toPar:'+6',r1:'78',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Tyrrell Hatton':   {position:40,toPar:'+2',r1:'74',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Cameron Smith':    {position:40,toPar:'+2',r1:'74',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Dustin Johnson':   {position:33,toPar:'+1',r1:'73',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Matt Fitzpatrick': {position:40,toPar:'+2',r1:'74',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'JJ Spaun':         {position:40,toPar:'+2',r1:'74',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Aaron Rai':        {position:10,toPar:'-1',r1:'71',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Cameron Young':    {position:33,toPar:'+1',r1:'73',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Marco Penge':      {position:56,toPar:'+4',r1:'76',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Samuel Stevens':   {position:17,toPar:'E', r1:'72',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Bryson DeChambeau':{position:56,toPar:'+4',r1:'76',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Chris Gotterup':   {position:17,toPar:'E', r1:'72',r2:'--',r3:'--',r4:'--',cut:false,live:false},
    'Sergio Garcia':    {position:17,toPar:'E', r1:'72',r2:'--',r3:'--',r4:'--',cut:false,live:false},
  }
};

function toParInt(s){if(!s||s==='--')return 0;if(s==='E')return 0;return parseInt(s)||0;}
function toParClass(s){if(!s||s==='--')return'na';if(s.startsWith('-'))return'under';if(s==='E')return'even';return'over';}
function posClass(pos,cut){if(cut)return'cut';if(!pos||pos===999)return'na';if(pos<=10)return'top';if(pos<=40)return'mid';return'bot';}
function fmtToPar(n){if(n===0)return'E';return(n>0?'+':'')+n;}

function playerScore(name){const d=state.players[name];if(!d||d.cut)return 999;return d.position||999;}
function teamScore(t){return TEAMS[t].reduce((s,p)=>s+playerScore(p),0);}
function teamToPar(t){return TEAMS[t].reduce((s,p)=>{const d=state.players[p];if(!d||d.cut)return s+20;return s+toParInt(d.toPar);},0);}
function leagueRanked(key){return LEAGUES[key].map(t=>({name:t,score:teamScore(t),topar:teamToPar(t)})).sort((a,b)=>a.score-b.score);}

function renderLeagueTable(id,key){
  document.getElementById(id).innerHTML=leagueRanked(key).map((t,i)=>`
    <div class="lrow ${i===0?'winner':''}">
      <div class="rank">${MEDALS[i]||i+1}</div>
      <div class="tname">${t.name}</div>
      <div class="ltopar">${fmtToPar(t.topar)}</div>
      <div class="tscore">${t.score}</div>
    </div>`).join('');
}

function roundsHtml(d){
  return['r1','r2','r3','r4'].map((r,i)=>{
    const val=d[r];const hasVal=val&&val!=='--';
    return`<span class="${hasVal?'scored':''}">${'R'+(i+1)}:${hasVal?val:'--'}</span>`;
  }).join(' · ');
}

function renderTeamCards(id,teams){
  document.getElementById(id).innerHTML=teams.map(team=>{
    const score=teamScore(team);const tp=teamToPar(team);
    const tpFmt=fmtToPar(tp);const tpClass=tp<0?'under':tp>0?'over':'even';
    const rows=TEAMS[team].map(p=>{
      const d=state.players[p];if(!d)return'';
      const badge=d.cut?'<span class="badge bc">Cut</span>':d.live?'<span class="badge bl">Live</span>':'<span class="badge bf">F</span>';
      const tp2=d.toPar||'--';
      const posStr=d.cut?'CUT':(d.position?d.position:'--');
      return`<div class="prow">
        <div class="pinfo">
          <div class="pname">${p} ${badge}</div>
          <div class="prounds">${roundsHtml(d)}</div>
        </div>
        <div class="ptopar ${toParClass(tp2)}">${tp2}</div>
        <div class="ppos ${posClass(d.position,d.cut)}">${posStr}</div>
      </div>`;
    }).join('');
    return`<div class="tcard">
      <div class="tcard-hdr">
        <div class="tcard-name">${team}</div>
        <div class="tcard-right">
          <span class="tcard-topar ptopar ${tpClass}">${tpFmt}</span>
          <span class="tcard-total">pos ${score>=3996?'--':score}</span>
        </div>
      </div>
      <div class="rnd-hdr"><span>Player</span><div class="rh-right"><span>Score</span><span>Pos</span></div></div>
      ${rows}
    </div>`;
  }).join('');
}

function renderAll(){
  renderLeagueTable('tbl-overall','overall');
  renderLeagueTable('tbl-league1','league1');
  renderLeagueTable('tbl-league2','league2');
  renderTeamCards('cards-overall',LEAGUES.overall);
  renderTeamCards('cards-league1',LEAGUES.league1);
  renderTeamCards('cards-league2',LEAGUES.league2);
  renderTeamCards('cards-teams',LEAGUES.overall);
  const rl=ROUND_LABELS[state.currentRound]||state.currentRound;
  document.getElementById('hdrRound').textContent=rl;
  document.getElementById('infoRound').textContent=rl;
  document.getElementById('infoUpdated').textContent='Updated '+state.lastUpdated;
  document.getElementById('infoUpdated3').textContent='Updated '+state.lastUpdated;
}
function setLiveStatus(isLive,msg){
  const dot=document.getElementById('liveDot');
  dot.className='live-dot '+(isLive?'live':'stale');
  dot.textContent=isLive?'Live':'Updated '+msg;
}

async function loadScores(){
  try{
    const resp=await fetch('./scores.json?t='+Date.now());
    if(!resp.ok)throw new Error('not found');
    const data=await resp.json();
    if(data.currentRound)state.currentRound=data.currentRound;
    if(data.lastUpdated)state.lastUpdated=data.lastUpdated;
    if(data.players){
      Object.entries(data.players).forEach(([name,info])=>{
        if(!state.players[name])return;
        const p=state.players[name];
        if(info.position!==null&&info.position!==undefined)p.position=info.position;
        if(info.toPar)p.toPar=info.toPar;
        ['r1','r2','r3','r4'].forEach(r=>{
          if(info[r]&&info[r]!=='--'&&info[r]!==null)p[r]=info[r];
        });
        p.cut=info.cut||false;
        p.live=info.live||false;
      });
    }
    renderAll();setLiveStatus(true,data.lastUpdated);
  }catch(e){
    console.warn('scores.json unavailable:',e.message);
    renderAll();setLiveStatus(false,'R1 snapshot');
  }
}

document.getElementById('tabBar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');if(!btn)return;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+btn.dataset.panel).classList.add('on');
  btn.classList.add('on');
});
async function manualRefresh(){
  const btn = document.getElementById('refreshBtn');
 const PAT = ['github_pat_', '11B4JHOFQ0a5EjnnDFsaRo_OSsMyxR34TXGQNapemKnENiT4cWm0sPLGzslrEwVQ9y2VVYQSPQT8DHYRDd'].join('');

  const WORKFLOW = 'update-scores.yml';
  const REPO = 'redrhino-dot/masters-fantasy';

  btn.disabled = true;
  btn.style.opacity = '.4';
  btn.textContent = '⏳';

  try {
    // Trigger the workflow
    await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${PAT}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main' })
    });

    // Wait 20s for action to complete then reload scores
    await new Promise(r => setTimeout(r, 20000));
    await loadScores();

  } catch(e) {
    console.warn('Trigger failed:', e);
    await loadScores(); // still refresh what we have
  }

  btn.disabled = false;
  btn.style.opacity = '1';
  btn.textContent = '↻';
}

loadScores();
setInterval(loadScores,5*60*1000);
</script>
</body>
</html>
