<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters 2026 — Fantasy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green-deep:#002a18;--green:#006747;--green-light:#0d7d55;--gold:#c9a84c;--gold-light:#e0c06e;--bg:#0f110e;--surface:#181a16;--surface-2:#20231e;--surface-3:#282b25;--border:rgba(255,255,255,.07);--border-gold:rgba(201,168,76,.25);--text:#edeae2;--text-muted:#888878;--text-faint:#484840;--red:#c0392b;--score-green:#27ae60;--r-sm:6px;--r-md:10px;--r-lg:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100dvh}
.hdr{background:var(--green-deep);border-bottom:1px solid var(--border-gold);padding:13px 20px 11px;text-align:center;position:sticky;top:0;z-index:100}
.hdr-inner{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px}
.hdr h1{font-family:'Libre Baskerville',Georgia,serif;font-size:1.2rem;font-weight:400;color:var(--gold);letter-spacing:.03em}
.hdr-meta{display:flex;align-items:center;justify-content:center;gap:10px}
.hdr-sub{font-size:.68rem;color:rgba(255,255,255,.4);letter-spacing:.07em;text-transform:uppercase}
.live-dot{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.live-dot.live{color:#5ab87a}.live-dot.live::before{content:'';width:6px;height:6px;border-radius:50%;background:#27ae60;animation:pulse 1.5s ease-in-out infinite}
.live-dot.stale{color:var(--text-faint)}.live-dot.stale::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text-faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:11px 10px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:inherit;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}.tab:hover:not(.on){color:var(--text);background:rgba(255,255,255,.03)}
.main{max-width:660px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}
.info-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:9px 15px;margin-bottom:14px}
.info-bar span{font-size:.77rem;color:var(--text-muted)}.info-bar strong{color:var(--text)}
.stitle{font-size:.67rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin:16px 0 8px}
.ltable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px}
.lrow{display:grid;grid-template-columns:44px 1fr auto;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border);gap:10px}
.lrow:last-child{border-bottom:none}.lrow.winner{background:linear-gradient(90deg,rgba(201,168,76,.07) 0%,transparent 60%)}
.rank{text-align:center;font-size:1.05rem;line-height:1}
.tname{font-weight:600;font-size:.92rem}.tscore{font-size:1.2rem;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:9px;overflow:hidden}
.tcard-hdr{background:var(--surface-2);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tcard-name{font-weight:600;font-size:.92rem}.tcard-total{font-size:1.1rem;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
.prow{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:9px 15px;gap:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.prow:last-child{border-bottom:none}.pname{font-size:.86rem}
.badge{border-radius:100px;font-size:.58rem;padding:2px 7px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;line-height:1.5}
.bl{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.bc{background:rgba(192,57,43,.1);color:#e07060;border:1px solid rgba(192,57,43,.3)}
.bf{background:rgba(39,174,96,.08);color:#5ab87a;border:1px solid rgba(39,174,96,.22)}
.ppos{font-size:.98rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:30px;text-align:right}
.ppos.top{color:var(--score-green)}.ppos.mid{color:var(--text)}.ppos.bot{color:#c0392b}.ppos.na{color:var(--text-faint)}
.lmembers{font-size:.73rem;color:var(--text-faint);padding:8px 15px 9px;border-bottom:1px solid var(--border)}
.loading{text-align:center;padding:40px;color:var(--text-faint);font-size:.88rem}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
      <ellipse cx="16" cy="16" rx="13" ry="13" fill="#004d33"/>
      <path d="M16 5C16 5 9 12 9 20c0 5.5 3 8 7 8s7-2.5 7-8c0-8-7-15-7-15z" fill="#006747" stroke="rgba(201,168,76,.5)" stroke-width=".8"/>
      <line x1="16" y1="5" x2="16" y2="28" stroke="rgba(201,168,76,.3)" stroke-width=".6"/>
    </svg>
    <h1>Masters 2026 Fantasy</h1>
  </div>
  <div class="hdr-meta">
    <span class="hdr-sub" id="hdrRound">Round 1</span>
    <span class="live-dot stale" id="liveDot">Loading…</span>
  </div>
</header>

<nav class="tabs" id="tabBar">
  <button class="tab on" data-panel="overall">Overall</button>
  <button class="tab" data-panel="league1">League 1</button>
  <button class="tab" data-panel="league2">League 2</button>
  <button class="tab" data-panel="teams">All Teams</button>
</nav>

<main class="main">
  <div id="panel-overall" class="panel on">
    <div class="info-bar">
      <span>🏆 <strong id="infoRound">Round 1</strong> Standings</span>
      <span id="infoUpdated">—</span>
    </div>
    <p class="stitle">League Table</p>
    <div class="ltable" id="tbl-overall"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-overall"></div>
  </div>

  <div id="panel-league1" class="panel">
    <div class="ltable" style="margin-bottom:14px">
      <div class="lmembers">League 1 · Kris · Graham · Carey</div>
    </div>
    <p class="stitle">League 1 Table</p>
    <div class="ltable" id="tbl-league1"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-league1"></div>
  </div>

  <div id="panel-league2" class="panel">
    <div class="ltable" style="margin-bottom:14px">
      <div class="lmembers">League 2 · Kris · Matt · Patrick</div>
    </div>
    <p class="stitle">League 2 Table</p>
    <div class="ltable" id="tbl-league2"></div>
    <p class="stitle">Team Scores</p>
    <div id="cards-league2"></div>
  </div>

  <div id="panel-teams" class="panel">
    <div class="info-bar">
      <span>All 5 teams</span>
      <span id="infoUpdated3">—</span>
    </div>
    <div id="cards-teams"></div>
  </div>
</main>

<script>
const TEAMS={Kris:['Xander Schauffele','Tommy Fleetwood','Harris English','Charl Schwartzel'],Graham:['Jon Rahm','Tyrrell Hatton','Cameron Smith','Dustin Johnson'],Carey:['Jon Rahm','Matt Fitzpatrick','JJ Spaun','Aaron Rai'],Matt:['Xander Schauffele','Cameron Young','Marco Penge','Samuel Stevens'],Patrick:['Bryson DeChambeau','Tommy Fleetwood','Chris Gotterup','Sergio Garcia']};
const LEAGUES={overall:['Kris','Graham','Carey','Matt','Patrick'],league1:['Kris','Graham','Carey'],league2:['Kris','Matt','Patrick']};
const MEDALS=['🥇','🥈','🥉'];
const ROUND_LABELS={R1:'Round 1',R2:'Round 2',R3:'Round 3',R4:'Round 4'};

// Fallback state (R1 snapshot 23:13 BST)
const state={
  currentRound:'R1',lastUpdated:'—',cutLine:null,isLive:false,
  players:{
    'Xander Schauffele':{R1:7, R2:null,R3:null,R4:null,cut:false,live:false},
    'Tommy Fleetwood':  {R1:11,R2:null,R3:null,R4:null,cut:false,live:false},
    'Harris English':   {R1:17,R2:null,R3:null,R4:null,cut:false,live:true},
    'Charl Schwartzel': {R1:49,R2:null,R3:null,R4:null,cut:false,live:false},
    'Jon Rahm':         {R1:74,R2:null,R3:null,R4:null,cut:false,live:true},
    'Tyrrell Hatton':   {R1:34,R2:null,R3:null,R4:null,cut:false,live:true},
    'Cameron Smith':    {R1:41,R2:null,R3:null,R4:null,cut:false,live:false},
    'Dustin Johnson':   {R1:34,R2:null,R3:null,R4:null,cut:false,live:false},
    'Matt Fitzpatrick': {R1:41,R2:null,R3:null,R4:null,cut:false,live:false},
    'JJ Spaun':         {R1:41,R2:null,R3:null,R4:null,cut:false,live:true},
    'Aaron Rai':        {R1:11,R2:null,R3:null,R4:null,cut:false,live:false},
    'Cameron Young':    {R1:34,R2:null,R3:null,R4:null,cut:false,live:false},
    'Marco Penge':      {R1:65,R2:null,R3:null,R4:null,cut:false,live:true},
    'Samuel Stevens':   {R1:17,R2:null,R3:null,R4:null,cut:false,live:false},
    'Bryson DeChambeau':{R1:57,R2:null,R3:null,R4:null,cut:false,live:false},
    'Chris Gotterup':   {R1:17,R2:null,R3:null,R4:null,cut:false,live:true},
    'Sergio Garcia':    {R1:17,R2:null,R3:null,R4:null,cut:false,live:false},
  }
};

// ── SCORING ──────────────────────────────────────────────────
function playerScore(name){
  const d=state.players[name];
  if(!d)return 999;
  if(d.cut)return state.cutLine?state.cutLine+1:999;
  for(const r of['R4','R3','R2','R1']){if(d[r]!==null&&d[r]!==undefined)return d[r];}
  return 999;
}
function teamScore(t){return TEAMS[t].reduce((s,p)=>s+playerScore(p),0);}
function leagueRanked(key){return LEAGUES[key].map(t=>({name:t,score:teamScore(t)})).sort((a,b)=>a.score-b.score);}
function posClass(pos){if(!pos||pos===999)return'na';if(pos<=10)return'top';if(pos<=40)return'mid';return'bot';}

// ── RENDER ────────────────────────────────────────────────────
function renderLeagueTable(id,key){
  document.getElementById(id).innerHTML=leagueRanked(key).map((t,i)=>`
    <div class="lrow ${i===0?'winner':''}">
      <div class="rank">${MEDALS[i]||i+1}</div>
      <div class="tname">${t.name}</div>
      <div class="tscore">${t.score}</div>
    </div>`).join('');
}
function renderTeamCards(id,teams){
  document.getElementById(id).innerHTML=teams.map(team=>{
    const total=teamScore(team);
    const rows=TEAMS[team].map(p=>{
      const d=state.players[p];
      const pos=playerScore(p);
      const badge=d.cut?'<span class="badge bc">Cut</span>':d.live?'<span class="badge bl">⏳ Live</span>':'<span class="badge bf">F</span>';
      return`<div class="prow"><div class="pname">${p}</div><div>${badge}</div><div class="ppos ${posClass(pos)}">${pos===999?'—':pos}</div></div>`;
    }).join('');
    return`<div class="tcard"><div class="tcard-hdr"><div class="tcard-name">${team}</div><div class="tcard-total">${total}</div></div>${rows}</div>`;
  }).join('');
}
function renderAll(){
  renderLeagueTable('tbl-overall','overall');
  renderLeagueTable('tbl-league1','league1');
  renderLeagueTable('tbl-league2','league2');
  renderTeamCards('cards-overall',LEAGUES.overall);
  renderTeamCards('cards-league1',LEAGUES.league1);
  renderTeamCards('cards-league2',LEAGUES.league2);
  renderTeamCards('cards-teams',LEAGUES.overall);
  const rl=ROUND_LABELS[state.currentRound]||state.currentRound;
  document.getElementById('hdrRound').textContent=rl;
  document.getElementById('infoRound').textContent=rl;
  document.getElementById('infoUpdated').textContent='Updated '+state.lastUpdated;
  document.getElementById('infoUpdated3').textContent='Updated '+state.lastUpdated;
}
function setLiveStatus(isLive,msg){
  const dot=document.getElementById('liveDot');
  dot.className='live-dot '+(isLive?'live':'stale');
  dot.textContent=isLive?'Live':'Updated '+msg;
}

// ── LOAD SCORES.JSON ─────────────────────────────────────────
async function loadScores(){
  try{
    const resp=await fetch('./scores.json?t='+Date.now());
    if(!resp.ok)throw new Error('not found');
    const data=await resp.json();
    if(data.currentRound)state.currentRound=data.currentRound;
    if(data.lastUpdated)state.lastUpdated=data.lastUpdated;
    if(data.cutLine)state.cutLine=data.cutLine;
    if(data.players){
      const r=data.currentRound||'R1';
      Object.entries(data.players).forEach(([name,info])=>{
        if(!state.players[name])return;
        if(info.position!==null&&info.position!==undefined)state.players[name][r]=info.position;
        state.players[name].cut=info.cut||false;
        state.players[name].live=info.live||false;
      });
    }
    renderAll();
    setLiveStatus(true,data.lastUpdated);
  }catch(e){
    console.warn('scores.json unavailable, using fallback:',e.message);
    state.lastUpdated='R1 snapshot (23:13 BST)';
    renderAll();
    setLiveStatus(false,'R1 snapshot');
  }
}

// ── TABS ──────────────────────────────────────────────────────
document.getElementById('tabBar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');if(!btn)return;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+btn.dataset.panel).classList.add('on');
  btn.classList.add('on');
});

// ── INIT + AUTO-REFRESH ───────────────────────────────────────
loadScores();
setInterval(loadScores, 5 * 60 * 1000); // refresh every 5 min
</script>
</body>
</html>
