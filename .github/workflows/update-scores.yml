name: Update Masters Scores

on:
  schedule:
    - cron: '0,15,30,45 11-23 9-12 4 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live scores from ESPN
        run: python fetch_scores.py

      - name: Upload debug HTML (inspect if parsing fails)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-espn-html
          path: debug_espn.html
          retention-days: 1

      - name: Commit scores.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || (
            git commit -m "Live scores — $(date -u '+%H:%M UTC %d %b')" &&
            git push
          )
